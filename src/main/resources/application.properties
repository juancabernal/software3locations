spring.application.name=eatupapi


spring.config.import=optional:file:.env[.properties],optional:classpath:commercial.properties,optional:classpath:payment.properties,optional:classpath:inventory.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST: localhost}
spring.rabbitmq.port=${RABBITMQ_PORT: 5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME: guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD: guest}
spring.rabbitmq.virtual-host=/
rabbitmq.dynamic=false

# Location RabbitMQ
rabbitmq.exchange.location=${RABBITMQ_EXCHANGE_LOCATION:location.exchange}
rabbitmq.queue.location.create=${RABBITMQ_QUEUE_LOCATION_CREATE:location.create}
rabbitmq.queue.location.update=${RABBITMQ_QUEUE_LOCATION_UPDATE:location.update}
rabbitmq.queue.location.patch=${RABBITMQ_QUEUE_LOCATION_PATCH:location.patch}
rabbitmq.routing-key.location.create=${RABBITMQ_ROUTING_KEY_LOCATION_CREATE:location.create}
rabbitmq.routing-key.location.update=${RABBITMQ_ROUTING_KEY_LOCATION_UPDATE:location.update}
rabbitmq.routing-key.location.patch=${RABBITMQ_ROUTING_KEY_LOCATION_PATCH:location.patch}
