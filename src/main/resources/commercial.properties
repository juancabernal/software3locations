spring.config.import=optional:file:.env[.properties]

# Exchange y Queue
rabbitmq.exchange.commercial=${RABBITMQ_EXCHANGE_COMMERCIAL:commercial.exchange}
rabbitmq.queue.purchase=${RABBITMQ_QUEUE_PURCHASE: purchase.queue}
rabbitmq.routing-key.purchase=${RABBITMQ_ROUTING_KEY_PURCHASE: purchase.received}
# Sales Create
rabbitmq.exchange.sales-create-request=${RABBITMQ_EXCHANGE_SALES_CREATE_REQUEST:sales.create.request.exchange}
rabbitmq.queue.sales-create-request=${RABBITMQ_QUEUE_SALES_CREATE_REQUEST:sales.create.request.queue}
rabbitmq.routing-key.sales-create-request=${RABBITMQ_ROUTING_KEY_SALES_CREATE_REQUEST:sales.create.request}
# Tables
rabbitmq.queue.table=${RABBITMQ_QUEUE_TABLE:table.queue}
rabbitmq.routing-key.table=${RABBITMQ_ROUTING_KEY_TABLE:table.events}